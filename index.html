<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarjeta de Presentación Digital</title>
    <!-- Iconos de FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* ==========================================================================
           CONFIGURACIÓN DE DISEÑO
           ========================================================================== */
        :root {
            --bg-gradient-1: #0f172a; 
            --bg-gradient-2: #1e1b4b; 
            --card-bg: rgba(255, 255, 255, 0.03); 
            --card-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-color: #d4af37;
            --accent-hover: #f3e5ab; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-gradient-1), var(--bg-gradient-2));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: var(--text-main);
        }

        /* Contenedor de la Tarjeta */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        }

        /* Avatar / Foto de Perfil */
        .profile-img-container {
            position: relative;
            width: 110px;
            height: 110px;
            margin: 0 auto 20px;
        }

        .profile-img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid var(--accent-color);
            padding: 3px;
        }

        /* Información Principal */
        .profile-name {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.5px;
        }

        .profile-title {
            font-size: 0.95rem;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 12px;
        }

        .profile-bio {
            font-size: 0.88rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 28px;
            padding: 0 10px;
        }

        /* Contenedor de Enlaces / Redes Sociales */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 28px;
        }

        .social-link {
            display: flex;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 14px 20px;
            border-radius: 14px;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all 0.25s ease;
        }

        .social-link i {
            font-size: 1.25rem;
            width: 30px;
            text-align: left;
            color: var(--accent-color);
            transition: color 0.25s ease;
        }

        .social-link:hover {
            background: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .social-link:hover i {
            color: var(--text-main);
        }

        /* Botón de Acción Principal */
        .btn-save {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            background: var(--text-main);
            color: var(--bg-gradient-1);
            padding: 14px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 0.95rem;
            text-decoration: none;
            transition: all 0.25s ease;
            border: none;
            cursor: pointer;
        }

        .btn-save:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        /* QR Integrado */
        .qr-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid var(--card-border);
        }
        
        .qr-icon {
            color: var(--text-muted);
            font-size: 1.4rem;
            cursor: pointer;
            transition: color 0.2s;
        }
        
        .qr-icon:hover {
            color: var(--accent-color);
        }

        /* Ventana Emergente (Modal) para el QR */
        .qr-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .qr-modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .qr-modal-content {
            background: #ffffff;
            padding: 24px;
            border-radius: 20px;
            text-align: center;
            position: relative;
            max-width: 300px;
            width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .qr-modal-content h3 {
            color: #0f172a;
            margin-bottom: 16px;
            font-size: 1.1rem;
        }

        .qr-modal-content img {
            width: 200px;
            height: 200px;
            display: block;
            margin: 0 auto;
        }

        .btn-close-modal {
            margin-top: 16px;
            background: #0f172a;
            color: #ffffff;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div class="card">
        <!-- Contenedor del Perfil -->
        <div class="profile-img-container">
            <img id="user-avatar" src="" alt="Avatar" class="profile-img">
        </div>
        
        <h1 id="user-name" class="profile-name"></h1>
        <p id="user-title" class="profile-title"></p>
        <p id="user-bio" class="profile-bio"></p>

        <!-- Contenedor de Redes Sociales dinámicas -->
        <div id="links-wrapper" class="links-container"></div>

        <!-- Botón de Contacto principal -->
        <a id="vcard-link" href="#" class="btn-save">
            <i class="fa-solid fa-user-plus"></i> Guardar Contacto
        </a>
        
        <div class="qr-section">
            <i id="qr-trigger" class="fa-solid fa-qrcode qr-icon" title="Compartir perfil"></i>
        </div>
    </div>

    <!-- Ventana Emergente del QR -->
    <div id="qr-modal" class="qr-modal">
        <div class="qr-modal-content">
            <h3>Escanea para compartir</h3>
            <div id="qr-image"></div>
            <button id="qr-close" class="btn-close-modal">Cerrar</button>
        </div>
    </div>

    <!-- Librería externa para generar códigos QR de forma nativa y segura -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <!-- ==========================================================================
       SECCIÓN EDITABLE EN JAVASCRIPT (CORREGIDA)
       ========================================================================== */ -->
    <script>
        // 1. DATOS DEL PERFIL
        const profileData = {
            name: "Victor H. Perez",
            title: "VP Experience Group",
            bio: "Transformando ideas en experiencias de alto valor. Consultoría integral en branding, desarrollo web y estrategias de negocio diseñadas para trascender.",
            avatarUrl: "user-avatar.jpg", 
            vCardUrl: "contacto.vcf" 
        };

        // 2. REDES SOCIALES Y ENLACES
        const socialLinks = [
            {
                label: "WhatsApp",
                icon: "fa-brands fa-whatsapp",
                url: "https://wa.me/5655576283"
            },
            {
                label: "LinkedIn",
                icon: "fa-brands fa-linkedin-in",
                url: "https://www.linkedin.com/company/120574038/"
            },
            {
                label: "Instagram",
                icon: "fa-brands fa-instagram",
                url: "https://instagram.com/dj_vicperez/"
            },
            {
                label: "Sitio Web",
                icon: "fa-solid fa-globe",
                url: "https://vpexperiencegroup.com.mx"
            }
        ];

        /* ==========================================================================
           PROCESAMIENTO LÓGICO Y ACTIVACIÓN DEL QR
           ========================================================================== */
        document.getElementById('user-name').textContent = profileData.name;
        document.getElementById('user-title').textContent = profileData.title;
        document.getElementById('user-bio').textContent = profileData.bio;
        document.getElementById('user-avatar').src = profileData.avatarUrl;
        document.getElementById('vcard-link').href = profileData.vCardUrl;

        const container = document.getElementById('links-wrapper');
        socialLinks.forEach(link => {
            const a = document.createElement('a');
            a.href = link.url;
            a.target = "_blank";
            a.className = "social-link";
            a.innerHTML = `<i class="${link.icon}"></i> ${link.label}`;
            container.appendChild(a);
        });

        // LÓGICA INTERACTIVA DEL CÓDIGO QR (NUEVA VERSIÓN)
        const qrTrigger = document.getElementById('qr-trigger');
        const qrModal = document.getElementById('qr-modal');
        const qrClose = document.getElementById('qr-close');
        const qrImageContainer = document.getElementById('qr-image');

        // Variable para controlar si el QR ya fue creado y no duplicarlo
        let qrGenerated = null;

        qrTrigger.addEventListener('click', () => {
            const currentUrl = window.location.href;
            
            // Limpiamos el contenedor por si acaso
            qrImageContainer.innerHTML = "";
            
            // Generamos el QR de forma nativa
            qrGenerated = new QRCode(qrImageContainer, {
                text: currentUrl,
                width: 200,
                height: 200,
                colorDark: "#0f172a",
                colorLight: "#ffffff",
                correctLevel: QRCode.CorrectLevel.H
            });

            // Ajuste visual para centrar el QR generado dentro del cuadro
            const imgQr = qrImageContainer.querySelector('img');
            if(imgQr) {
                imgQr.style.margin = "0 auto";
            }
            
            // Muestra la ventana emergente
            qrModal.classList.add('active');
        });

        // Cerrar al presionar el botón
        qrClose.addEventListener('click', () => {
            qrModal.classList.remove('active');
        });

        // Cerrar al presionar fuera del cuadro blanco
        qrModal.addEventListener('click', (e) => {
            if(e.target === qrModal) {
                qrModal.classList.remove('active');
            }
        });
    </script>
</body>
</html>
